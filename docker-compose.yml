services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_URL=postgres://user:pass@db:5432/bdvpn
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bdvpn
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  coturn:
    image: coturn/coturn
    network_mode: "host"
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf

volumes:
  pgdata:
  redisdata:
